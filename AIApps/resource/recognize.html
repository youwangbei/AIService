<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>ONNX CV 图像分类</title>
    <style>
        :root {
            --primary-color: #10b981;
            --primary-light: #34d399;
            --primary-dark: #059669;
            --bg: #f1f5f9;
            --surface: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --radius-md: 0.5rem;
            --radius-lg: 0.75rem;
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: var(--font-family);
            background: var(--bg);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        /* 顶部栏 */
        .top-bar {
            padding: 16px 24px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: var(--shadow-sm);
        }
        .btn-back {
            padding: 8px 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            background: var(--surface);
            color: var(--text-primary);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .btn-back:hover { background: var(--bg); }
        .title {
            font-size: 18px;
            font-weight: 600;
            color: var(--primary-color);
        }
        /* 信息提示 */
        .info-box {
            background: #f0fdf4;
            border-left: 4px solid var(--primary-color);
            padding: 16px 20px;
            margin: 20px 24px 0 24px;
            border-radius: var(--radius-md);
            font-size: 14px;
            color: #065f46;
            max-width: 800px;
        }
        .info-box strong { color: var(--primary-dark); }
        /* 聊天区 */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
        }
        .message {
            max-width: 75%;
            padding: 14px 18px;
            border-radius: var(--radius-lg);
            line-height: 1.6;
            word-wrap: break-word;
            animation: fadeIn 0.2s ease;
            position: relative;
        }
        .message.user {
            background: var(--primary-color);
            color: #fff;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .message.assistant {
            background: var(--surface);
            color: var(--text-primary);
            align-self: flex-start;
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
            box-shadow: var(--shadow-sm);
        }
        .msg-header {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 4px;
            opacity: 0.7;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .message.user .msg-header { color: rgba(255,255,255,0.85); }
        .message.assistant .msg-header { color: var(--text-secondary); }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message img {
            max-width: 200px;
            border-radius: var(--radius-md);
            margin-top: 12px;
            display: block;
            box-shadow: var(--shadow-sm);
        }
        /* 输入区 */
        .input-area {
            padding: 16px 24px;
            background: var(--surface);
            border-top: 1px solid var(--border);
        }
        .input-area form {
            display: flex;
            gap: 10px;
            align-items: center;
            max-width: 800px;
            margin: 0 auto;
        }
        input[type="file"] {
            flex: 1;
            border-radius: var(--radius-md);
            padding: 10px 12px;
            font-size: 14px;
            font-family: var(--font-family);
            outline: none;
            border: 1px dashed var(--border);
            background: var(--bg);
            color: var(--text-primary);
            transition: border-color 0.2s;
            cursor: pointer;
        }
        input[type="file"]:hover { border-color: var(--primary-color); }
        input[type="file"]::file-selector-button {
            padding: 8px 16px;
            border: none;
            border-radius: var(--radius-md);
            background: var(--primary-color);
            color: #fff;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            margin-right: 12px;
        }
        input[type="file"]::file-selector-button:hover { background: var(--primary-dark); }
        .btn-submit {
            padding: 10px 24px;
            border: none;
            border-radius: var(--radius-md);
            background: var(--primary-color);
            color: #fff;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }
        .btn-submit:hover { background: var(--primary-dark); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }
    </style>
</head>
<body>
    <div class="top-bar">
        <button class="btn-back" onclick="window.location.href='/menu'">← 返回</button>
        <span class="title">图像分类</span>
    </div>

    <div class="info-box">
        <strong>使用说明：</strong> 上传图片进行图像分类，支持常见图片格式（JPG、PNG等）。
    </div>

    <div class="chat-container" id="chat-container"></div>

    <div class="input-area">
        <form id="upload-form">
            <input type="file" id="image-input" accept="image/*" required>
            <button type="submit" class="btn-submit">识别图片</button>
        </form>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const uploadForm = document.getElementById('upload-form');
        const imageInput = document.getElementById('image-input');

        function appendMessage(role, content, imageUrl = null) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', role);
            msgDiv.id = 'msg-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);
            const label = role === 'user' ? '你' : 'ONNX CV';
            msgDiv.innerHTML = '<div class="msg-header">' + label + '</div>' + content;
            if (imageUrl) {
                const img = document.createElement('img');
                img.src = imageUrl;
                msgDiv.appendChild(img);
            }
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return msgDiv.id;
        }

        function updateMessage(messageId, content) {
            const element = document.getElementById(messageId);
            if (element) {
                element.innerHTML = '<div class="msg-header">ONNX CV</div>' + content;
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }
        }

        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!imageInput.files.length) return;
            const file = imageInput.files[0];
            const reader = new FileReader();
            reader.onload = async function(event) {
                const base64Url = event.target.result;
                const base64Data = base64Url.split(',')[1];
                appendMessage('user', '已上传图片: ' + file.name, base64Url);
                const thinkingId = appendMessage('assistant', '正在推理...');
                const payload = { filename: file.name, image: base64Data };
                try {
                    const response = await fetch('/cv/upload/send', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (!response.ok) throw new Error("识别失败");
                    const data = await response.json();
                    if (data.success) {
                        const aiText = '识别结果: <strong>' + data.class_name + '</strong><br>置信率: <strong>' + (data.confidence * 100).toFixed(1) + '%</strong>';
                        updateMessage(thinkingId, aiText);
                    } else {
                        updateMessage(thinkingId, '[错误] ' + data.message);
                    }
                } catch (err) {
                    updateMessage(thinkingId, '[错误] ' + err.message);
                }
                imageInput.value = '';
            };
            reader.readAsDataURL(file);
        });
    </script>
</body>
</html>
