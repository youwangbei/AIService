<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>AI 聊天助手</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --primary-light: #3b82f6;
            --primary-dark: #1d4ed8;
            --bg: #f1f5f9;
            --surface: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --radius-md: 0.5rem;
            --radius-lg: 0.75rem;
            --radius-xl: 1rem;
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: var(--font-family);
            background: var(--bg);
            color: var(--text-primary);
            display: flex;
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }
        /* 侧边栏 */
        .sidebar {
            width: 260px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            box-shadow: var(--shadow-sm);
            z-index: 10;
        }
        .sidebar-header {
            padding: 20px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .sidebar-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }
        .btn-new-chat {
            width: 100%;
            padding: 10px 0;
            border: none;
            border-radius: var(--radius-md);
            background: var(--primary-color);
            color: #fff;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-new-chat:hover { background: var(--primary-dark); }
        .session-list {
            flex: 1;
            overflow-y: auto;
            list-style: none;
        }
        .session-list li {
            padding: 14px 16px;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
            color: var(--text-secondary);
            transition: all 0.15s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .session-list li:hover { background: var(--bg); color: var(--text-primary); }
        .session-list li.active {
            background: #eff6ff;
            color: var(--primary-color);
            font-weight: 500;
            border-left: 3px solid var(--primary-color);
        }
        /* 主区域 */
        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }
        .top-bar {
            padding: 12px 20px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            box-shadow: var(--shadow-sm);
        }
        .btn-back {
            padding: 7px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            background: var(--surface);
            color: var(--text-primary);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .btn-back:hover { background: var(--bg); }
        .btn-sync {
            padding: 7px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            background: var(--surface);
            color: var(--text-primary);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .btn-sync:hover { background: var(--bg); }
        .top-bar select {
            padding: 7px 32px 7px 10px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            font-size: 13px;
            background: var(--surface);
            color: var(--text-primary);
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 8px center;
            background-size: 16px;
        }
        .top-bar select:focus { outline: none; border-color: var(--primary-color); }
        .toggle-group {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: var(--text-secondary);
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 22px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .switch-slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--border);
            transition: .3s;
            border-radius: 22px;
        }
        .switch-slider:before {
            position: absolute;
            content: "";
            height: 16px; width: 16px;
            left: 3px; bottom: 3px;
            background: white;
            transition: .3s;
            border-radius: 50%;
        }
        input:checked + .switch-slider { background: var(--primary-color); }
        input:checked + .switch-slider:before { transform: translateX(18px); }
        /* 聊天区 */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            max-width: 860px;
            width: 100%;
            margin: 0 auto;
        }
        .message {
            max-width: 75%;
            padding: 14px 18px;
            border-radius: var(--radius-lg);
            line-height: 1.6;
            word-wrap: break-word;
            animation: fadeIn 0.2s ease;
            position: relative;
        }
        .message.user {
            background: var(--primary-color);
            color: #fff;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .message.assistant {
            background: var(--surface);
            color: var(--text-primary);
            align-self: flex-start;
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
            box-shadow: var(--shadow-sm);
        }
        .msg-header {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 4px;
            opacity: 0.7;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .message.user .msg-header { color: rgba(255,255,255,0.85); }
        .message.assistant .msg-header { color: var(--text-secondary); }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .tts-btn {
            position: absolute;
            bottom: -28px;
            right: 0;
            padding: 3px 10px;
            border-radius: var(--radius-md);
            font-size: 12px;
            cursor: pointer;
            background: var(--surface);
            color: var(--text-secondary);
            border: 1px solid var(--border);
            transition: all 0.15s;
            white-space: nowrap;
        }
        .tts-btn:hover { color: var(--primary-color); border-color: var(--primary-color); }
        .message.assistant .tts-btn { bottom: -28px; }
        .message.user .tts-btn { display: none; }
        /* 输入区 */
        .input-area {
            padding: 16px 24px;
            background: var(--surface);
            border-top: 1px solid var(--border);
        }
        .input-area form {
            display: flex;
            gap: 10px;
            align-items: flex-end;
            max-width: 860px;
            margin: 0 auto;
        }
        textarea {
            flex: 1;
            resize: none;
            border-radius: var(--radius-md);
            padding: 12px 14px;
            font-size: 14px;
            font-family: var(--font-family);
            outline: none;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text-primary);
            transition: border-color 0.2s;
            min-height: 48px;
            max-height: 120px;
        }
        textarea:focus { border-color: var(--primary-color); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        .btn-send {
            padding: 12px 24px;
            border: none;
            border-radius: var(--radius-md);
            background: var(--primary-color);
            color: #fff;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }
        .btn-send:hover { background: var(--primary-dark); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.0/dist/purify.min.js"></script>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-title">会话列表</div>
            <button class="btn-new-chat" id="newChatBtn">+ 新聊天</button>
        </div>
        <ul class="session-list" id="sessionList"></ul>
    </div>

    <div class="main-area">
        <div class="top-bar">
            <button class="btn-back" onclick="window.location.href='/menu'">← 返回</button>
            <button class="btn-sync" id="sync-history-btn">同步历史</button>
            <select id="model-select">
                <option value="qwen2.5" selected>qwen2.5:0.5b</option>
                <option value="qwen3-vl">qwen3-vl:2b</option>
            </select>
            <div class="toggle-group">
                <label class="switch">
                    <input type="checkbox" id="rag-switch">
                    <span class="switch-slider"></span>
                </label>
                <span>查询知识库</span>
            </div>
        </div>

        <div class="chat-container" id="chat-container"></div>

        <div class="input-area">
            <form id="chat-form">
                <textarea id="question" placeholder="输入你的问题..." required></textarea>
                <button type="submit" class="btn-send">发送</button>
            </form>
        </div>
    </div>

    <script>
        let currentSessionId = null;
        let tempSession = false;
        const sessions = {};
        const sessionList = document.getElementById('sessionList');
        const chatContainer = document.getElementById('chat-container');
        const chatForm = document.getElementById('chat-form');
        const questionInput = document.getElementById('question');
        const syncBtn = document.getElementById('sync-history-btn');
        const newChatBtn = document.getElementById('newChatBtn');

        async function playTTS(text) {
            try {
                const res = await fetch('/chat/tts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });
                if (!res.ok) { alert('[错误] 语音合成失败'); return; }
                const data = await res.json();
                if (data.success && data.url) {
                    const audio = new Audio(data.url);
                    audio.play().catch(err => alert('[错误] 播放失败'));
                } else {
                    alert('[错误] 无法获取语音');
                }
            } catch (err) {
                alert('[错误] 请求语音接口失败');
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function appendMessage(role, content) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', role);
            const uniqueId = 'msg-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);
            msgDiv.id = uniqueId;
            const safeHtml = DOMPurify.sanitize(marked.parse(content));
            const escapedContent = escapeHtml(content);
            const label = role === 'user' ? '你' : 'AI';
            msgDiv.innerHTML = '<div class="msg-header">' + label + '</div>' + safeHtml;
            if (role === 'assistant') {
                const btn = document.createElement('button');
                btn.className = 'tts-btn';
                btn.textContent = '🔊 语音';
                btn.onclick = function() { playTTS(content); };
                msgDiv.appendChild(btn);
            }
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return uniqueId;
        }

        function updateMessage(elementId, content) {
            const existingDiv = document.getElementById(elementId);
            if (existingDiv) {
                const safeHtml = DOMPurify.sanitize(marked.parse(content));
                existingDiv.innerHTML = '<div class="msg-header">AI</div>' + safeHtml;
                const btn = document.createElement('button');
                btn.className = 'tts-btn';
                btn.textContent = '🔊 语音';
                btn.onclick = function() { playTTS(content); };
                existingDiv.appendChild(btn);
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }
        }

        function clearMessages() { chatContainer.innerHTML = ''; }

        function renderSessionList() {
            sessionList.innerHTML = '';
            for (const id in sessions) {
                const li = document.createElement('li');
                li.textContent = sessions[id].name || '会话 ' + id;
                li.dataset.id = id;
                if (id === currentSessionId) li.classList.add('active');
                li.onclick = () => switchSession(id);
                sessionList.appendChild(li);
            }
        }

        async function switchSession(id) {
            currentSessionId = String(id);
            tempSession = false;
            clearMessages();
            if (!sessions[id]) sessions[id] = { name: '会话 ' + id, messages: [] };
            if (!sessions[id].messages || sessions[id].messages.length === 0) {
                try {
                    const res = await fetch('/chat/history', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ sessionId: currentSessionId })
                    });
                    const data = await res.json();
                    if (data.success && Array.isArray(data.history)) {
                        sessions[id].messages = [];
                        data.history.forEach(item => {
                            sessions[id].messages.push({ role: item.is_user ? 'user' : 'assistant', content: item.content });
                        });
                    }
                } catch (err) { console.error('获取历史失败', err); }
            }
            if (sessions[id].messages) {
                sessions[id].messages.forEach(m => appendMessage(m.role, m.content));
            }
            renderSessionList();
        }

        newChatBtn.addEventListener('click', () => {
            currentSessionId = 'temp';
            tempSession = true;
            clearMessages();
        });

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const question = questionInput.value.trim();
            if (!question) return;
            const model = document.getElementById('model-select').value;
            const useRag = document.getElementById('rag-switch').checked;
            appendMessage('user', question);
            const thinkingId = appendMessage('assistant', '思考中...');

            if (tempSession || !currentSessionId) {
                try {
                    const response = await fetch('/chat/send-new-session', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ question, model, useRag })
                    });
                    if (!response.ok) throw new Error('HTTP error! status: ' + response.status);
                    const data = await response.json();
                    if (data.success) {
                        const sessionId = String(data.sessionId);
                        sessions[sessionId] = { name: '新会话', messages: [
                            { role: 'user', content: question },
                            { role: 'assistant', content: data.Information }
                        ]};
                        currentSessionId = sessionId;
                        tempSession = false;
                        renderSessionList();
                        updateMessage(thinkingId, data.Information);
                    } else {
                        updateMessage(thinkingId, '[错误] ' + (data.message || '未知错误'));
                    }
                } catch (err) { updateMessage(thinkingId, '[错误] ' + err.message); }
            } else {
                if (!sessions[currentSessionId]) sessions[currentSessionId] = { name: '会话 ' + currentSessionId, messages: [] };
                sessions[currentSessionId].messages.push({ role: 'user', content: question });
                try {
                    const response = await fetch('/chat/send', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ question, sessionId: currentSessionId, model, useRag })
                    });
                    if (!response.ok) throw new Error('HTTP error! status: ' + response.status);
                    const data = await response.json();
                    if (data.success) {
                        updateMessage(thinkingId, data.Information);
                        sessions[currentSessionId].messages.push({ role: 'assistant', content: data.Information });
                    } else {
                        updateMessage(thinkingId, '[错误] ' + (data.message || '未知错误'));
                    }
                } catch (err) { updateMessage(thinkingId, '[错误] ' + err.message); }
            }
            questionInput.value = '';
        });

        syncBtn.addEventListener('click', async () => {
            if (!currentSessionId || tempSession) { alert('请选择已有会话进行同步'); return; }
            try {
                const res = await fetch('/chat/history', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sessionId: currentSessionId })
                });
                const data = await res.json();
                if (data.success && Array.isArray(data.history)) {
                    sessions[currentSessionId].messages = [];
                    clearMessages();
                    data.history.forEach(item => {
                        appendMessage(item.is_user ? 'user' : 'assistant', item.content);
                        sessions[currentSessionId].messages.push({ role: item.is_user ? 'user' : 'assistant', content: item.content });
                    });
                } else { alert('[错误] 无法获取历史数据'); }
            } catch (err) { alert('[错误] 请求历史数据失败'); }
        });

        async function loadSessions() {
            try {
                const res = await fetch('/chat/sessions');
                const data = await res.json();
                if (data.success && Array.isArray(data.sessions)) {
                    data.sessions.forEach(s => {
                        const sid = String(s.sessionId);
                        sessions[sid] = { name: s.name || '会话 ' + sid, messages: [] };
                    });
                    renderSessionList();
                }
            } catch (err) { console.error('获取会话列表失败', err); }
        }
        loadSessions();
    </script>
</body>
</html>
