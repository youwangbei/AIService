<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>AI 图像识别助手</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --primary-light: #3b82f6;
            --primary-dark: #1d4ed8;
            --bg: #f1f5f9;
            --surface: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --radius-md: 0.5rem;
            --radius-lg: 0.75rem;
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: var(--font-family);
            background: var(--bg);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        /* 顶部栏 */
        .top-bar {
            padding: 16px 24px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            box-shadow: var(--shadow-sm);
        }
        .btn-back {
            padding: 8px 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            background: var(--surface);
            color: var(--text-primary);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .btn-back:hover { background: var(--bg); }
        /* 聊天区 */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
        }
        .message {
            max-width: 75%;
            padding: 14px 18px;
            border-radius: var(--radius-lg);
            line-height: 1.6;
            word-wrap: break-word;
            animation: fadeIn 0.2s ease;
            position: relative;
        }
        .message.user {
            background: var(--primary-color);
            color: #fff;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .message.assistant {
            background: var(--surface);
            color: var(--text-primary);
            align-self: flex-start;
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
            box-shadow: var(--shadow-sm);
        }
        .msg-header {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 4px;
            opacity: 0.7;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .message.user .msg-header { color: rgba(255,255,255,0.85); }
        .message.assistant .msg-header { color: var(--text-secondary); }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message img {
            max-width: 200px;
            border-radius: var(--radius-md);
            margin-top: 12px;
            display: block;
            box-shadow: var(--shadow-sm);
        }
        /* 输入区 */
        .input-area {
            padding: 16px 24px;
            background: var(--surface);
            border-top: 1px solid var(--border);
        }
        .input-area .input-group {
            display: flex;
            gap: 10px;
            align-items: center;
            max-width: 800px;
            margin: 0 auto;
        }
        input[type="text"] {
            flex: 2;
            border-radius: var(--radius-md);
            padding: 10px 14px;
            font-size: 14px;
            font-family: var(--font-family);
            outline: none;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text-primary);
            transition: border-color 0.2s;
        }
        input[type="text"]:focus { border-color: var(--primary-color); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        input[type="text"]::placeholder { color: var(--text-secondary); opacity: 0.6; }
        input[type="file"] {
            flex: 1;
            border-radius: var(--radius-md);
            padding: 10px 12px;
            font-size: 14px;
            font-family: var(--font-family);
            outline: none;
            border: 1px dashed var(--border);
            background: var(--bg);
            color: var(--text-primary);
            transition: border-color 0.2s;
            cursor: pointer;
        }
        input[type="file"]:hover { border-color: var(--primary-color); }
        input[type="file"]::file-selector-button {
            padding: 8px 16px;
            border: none;
            border-radius: var(--radius-md);
            background: var(--primary-color);
            color: #fff;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            margin-right: 12px;
        }
        input[type="file"]::file-selector-button:hover { background: var(--primary-dark); }
        .btn-send {
            padding: 10px 24px;
            border: none;
            border-radius: var(--radius-md);
            background: var(--primary-color);
            color: #fff;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }
        .btn-send:hover { background: var(--primary-dark); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }
        /* 提示信息 */
        .hint {
            text-align: center;
            font-size: 13px;
            color: var(--text-secondary);
            margin: 8px auto 0;
            max-width: 800px;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <button class="btn-back" onclick="window.location.href='/menu'">← 返回</button>
    </div>

    <div class="chat-container" id="chat-container"></div>

    <div class="input-area">
        <div class="input-group">
            <input type="text" id="text-input" placeholder="输入问题...">
            <input type="file" id="image-input" accept="image/*">
            <button id="send-btn" class="btn-send">发送</button>
        </div>
        <div class="hint">支持文本+图片组合输入，按Enter键快速发送</div>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const textInput = document.getElementById('text-input');
        const imageInput = document.getElementById('image-input');
        const sendBtn = document.getElementById('send-btn');

        function appendMessage(role, content, imageUrl = null) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', role);
            msgDiv.id = 'msg-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);
            const label = role === 'user' ? '你' : 'AI';
            msgDiv.innerHTML = '<div class="msg-header">' + label + '</div>' + content;
            if (imageUrl) {
                const img = document.createElement('img');
                img.src = imageUrl;
                msgDiv.appendChild(img);
            }
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return msgDiv.id;
        }

        function updateMessage(messageId, content) {
            const element = document.getElementById(messageId);
            if (element) {
                element.innerHTML = '<div class="msg-header">AI</div>' + content;
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }
        }

        async function sendMessage() {
            const text = textInput.value.trim();
            const hasImage = imageInput.files.length > 0;

            if (!text || !hasImage) {
                alert('请输入问题并选择图片');
                return;
            }

            let base64Url = null;
            let base64Data = null;
            let fileName = null;

            const file = imageInput.files[0];
            fileName = file.name;
            base64Url = await new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.readAsDataURL(file);
            });
            base64Data = base64Url.split(',')[1];

            let userContent = text;
            if (fileName) userContent += ' (图片: ' + fileName + ')';
            appendMessage('user', userContent, base64Url);

            const thinkingId = appendMessage('assistant', '思考中...');

            const payload = {
                content: text,
                filename: fileName || '',
                image: base64Data || ''
            };

            try {
                const response = await fetch('/upload/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) throw new Error("发送失败");

                const data = await response.json();
                if (data.success) {
                    const aiText = data.Information || data.class_name;
                    updateMessage(thinkingId, aiText);
                } else {
                    updateMessage(thinkingId, '[错误] ' + data.message);
                }

            } catch (err) {
                updateMessage(thinkingId, '[错误] ' + err.message);
            }

            textInput.value = '';
            imageInput.value = '';
        }

        sendBtn.addEventListener('click', sendMessage);
        textInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
