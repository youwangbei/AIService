<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的AI助手主菜单</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --primary-light: #3b82f6;
            --primary-dark: #1d4ed8;
            --bg: #0f172a;
            --surface: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --border: #334155;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.3);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.3), 0 2px 4px -2px rgb(0 0 0 / 0.3);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.3), 0 4px 6px -4px rgb(0 0 0 / 0.3);
            --radius-md: 0.5rem;
            --radius-lg: 0.75rem;
            --radius-xl: 1rem;
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: var(--font-family);
            background: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            position: relative;
        }
        /* 星空背景 */
        .stars {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(255,255,255,0.7);
            border-radius: 50%;
            animation: twinkling 3s infinite ease-in-out;
        }
        @keyframes twinkling {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; }
        }
        /* 加载界面 */
        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            background: var(--bg);
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 20;
        }
        .loading-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 30px;
            color: var(--primary-light);
            text-shadow: 0 0 10px var(--primary-light);
            letter-spacing: 1px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { text-shadow: 0 0 10px var(--primary-light); }
            50% { text-shadow: 0 0 20px var(--primary-light), 0 0 30px var(--primary-light); }
        }
        .progress-bar {
            width: 320px;
            height: 6px;
            background: var(--surface);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        .progress-bar-inner {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--primary-light));
            width: 0%;
            transition: width 0.3s ease;
        }
        .loading-text {
            font-size: 15px;
            color: var(--text-secondary);
        }
        /* 主菜单 */
        .menu-container {
            display: none;
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: center;
            animation: fadeIn 0.8s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .menu-header {
            margin-bottom: 40px;
        }
        .menu-title {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 12px;
            background: linear-gradient(135deg, var(--primary-light), #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .menu-subtitle {
            font-size: 16px;
            color: var(--text-secondary);
            max-width: 500px;
            margin: 0 auto;
            line-height: 1.6;
        }
        .menu-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border), transparent);
            margin: 30px auto;
            max-width: 400px;
        }
        .menu-options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .menu-option {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 24px;
            text-align: left;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .menu-option:hover {
            transform: translateY(-4px);
            border-color: var(--primary-color);
            box-shadow: var(--shadow-lg);
        }
        .menu-option::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary-color), var(--primary-light));
            opacity: 0;
            transition: opacity 0.3s;
        }
        .menu-option:hover::before { opacity: 1; }
        .option-number {
            display: inline-block;
            width: 28px;
            height: 28px;
            background: var(--primary-color);
            color: #fff;
            border-radius: 50%;
            text-align: center;
            line-height: 28px;
            font-size: 14px;
            font-weight: 600;
            margin-right: 12px;
        }
        .option-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-primary);
        }
        .option-desc {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.5;
        }
        .menu-footer {
            margin-top: 30px;
        }
        .btn-logout {
            padding: 12px 32px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            background: transparent;
            color: var(--text-secondary);
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-logout:hover {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border-color: #ef4444;
        }
    </style>
</head>
<body>
    <!-- 星空 -->
    <script>
        for (let i = 0; i < 60; i++) {
            let star = document.createElement("div");
            star.className = "stars";
            star.style.top = Math.random() * 100 + "vh";
            star.style.left = Math.random() * 100 + "vw";
            star.style.animationDuration = 2 + Math.random() * 3 + "s";
            document.body.appendChild(star);
        }
    </script>

    <!-- 加载界面 -->
    <div class="loading-container" id="loading-container">
        <div class="loading-title">我的 AI 助手</div>
        <div class="progress-bar">
            <div class="progress-bar-inner"></div>
        </div>
        <div class="loading-text">系统正在初始化，请稍候...</div>
    </div>

    <!-- 主菜单 -->
    <div class="menu-container" id="menu-container">
        <div class="menu-header">
            <h1 class="menu-title">欢迎使用 AI 助手</h1>
            <p class="menu-subtitle">选择以下功能开始您的智能体验</p>
        </div>
        <div class="menu-divider"></div>
        <div class="menu-options">
            <div class="menu-option" id="chat-service">
                <div><span class="option-number">1</span><span class="option-title">AI 聊天助手</span></div>
                <p class="option-desc">与智能AI进行对话交流，支持多轮对话和知识库查询</p>
            </div>
            <div class="menu-option" id="image-service">
                <div><span class="option-number">2</span><span class="option-title">AI 图像识别</span></div>
                <p class="option-desc">上传图片进行智能识别和分析，支持多种图像处理功能</p>
            </div>
            <div class="menu-option" id="cv-service">
                <div><span class="option-number">3</span><span class="option-title">图像分类</span></div>
                <p class="option-desc">上传图片进行图像分类和识别</p>
            </div>
        </div>
        <div class="menu-footer">
            <button class="btn-logout" id="logout">退出登录</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const progressBar = document.querySelector('.progress-bar-inner');
            const loadingContainer = document.getElementById('loading-container');
            const menuContainer = document.getElementById('menu-container');
            let percent = 0;
            let interval = setInterval(() => {
                percent += 10;
                progressBar.style.width = percent + "%";
                if (percent >= 100) {
                    clearInterval(interval);
                    setTimeout(() => {
                        loadingContainer.style.display = 'none';
                        menuContainer.style.display = 'block';
                    }, 300);
                }
            }, 200);
        });

        // 进入服务
        function loadService(path, errorMsg) {
            fetch(path, { method: 'GET', headers: { 'Accept': 'text/html' } })
                .then(res => res.text())
                .then(html => { document.open(); document.write(html); document.close(); })
                .catch(() => alert(errorMsg));
        }

        document.getElementById('chat-service').addEventListener('click', () => loadService('/chat', '进入AI聊天服务异常！'));
        document.getElementById('image-service').addEventListener('click', () => loadService('/upload', '进入AI图像识别服务异常！'));
        document.getElementById('cv-service').addEventListener('click', () => loadService('/cv/upload', '进入ONNX CV服务异常！'));
        document.getElementById('logout').addEventListener('click', () => {
            let userId = sessionStorage.getItem('userId');
            fetch('/user/logout', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId: userId, type: 'manual', gameType: 0 })
            })
                .then(res => {
                    if (!res.ok) throw new Error('Logout failed');
                    return fetch('/', { method: 'GET', headers: { 'Accept': 'text/html' } });
                })
                .then(res => res.text())
                .then(html => {
                    sessionStorage.clear();
                    document.open();
                    document.write(html);
                    document.close();
                })
                .catch(() => alert('退出登录失败！'));
        });

        window.addEventListener('beforeunload', function() {
            let userId = sessionStorage.getItem('userId');
            if (userId) {
                const data = new Blob([JSON.stringify({ userId: userId, type: 'refresh', gameType: 0 })],
                    { type: 'application/json' });
                navigator.sendBeacon('/user/logout', data);
            }
        });

        window.addEventListener('load', function() {
            let userId = sessionStorage.getItem('userId');
            if (!userId) {
                window.location.href = '/entry';
            }
        });
    </script>
</body>
</html>
