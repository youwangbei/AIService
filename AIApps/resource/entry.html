<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的AI助手</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --primary-light: #3b82f6;
            --primary-dark: #1d4ed8;
            --bg: #f1f5f9;
            --surface: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            --radius-md: 0.5rem;
            --radius-lg: 0.75rem;
            --radius-xl: 1rem;
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: var(--font-family);
            background: var(--bg);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
        }
        /* 标题 */
        .main-title {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 40px;
            text-align: center;
            background: linear-gradient(135deg, var(--primary-color), var(--primary-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        /* 卡片容器 */
        .card-container {
            width: 100%;
            max-width: 400px;
            background: var(--surface);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .card-container:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }
        .card-header {
            padding: 24px 24px 16px;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }
        .card-title {
            font-size: 24px;
            font-weight: 600;
            color: var(--text-primary);
            margin: 0;
        }
        .card-body {
            padding: 24px;
        }
        /* 表单 */
        .form-group {
            margin-bottom: 20px;
        }
        .form-label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
        }
        .form-control {
            width: 100%;
            padding: 12px 16px;
            font-size: 15px;
            font-family: var(--font-family);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            background: var(--bg);
            color: var(--text-primary);
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-control:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
        }
        .form-control::placeholder { color: var(--text-secondary); opacity: 0.6; }
        /* 按钮 */
        .btn-submit {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: var(--radius-md);
            background: var(--primary-color);
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 8px;
        }
        .btn-submit:hover { background: var(--primary-dark); }
        /* 切换链接 */
        .switch-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: var(--text-secondary);
        }
        .switch-link a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
            cursor: pointer;
        }
        .switch-link a:hover { text-decoration: underline; }
        /* 提示框 */
        .alert {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--primary-color);
            color: #fff;
            padding: 12px 24px;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-md);
            font-weight: 500;
            z-index: 1000;
            display: none;
            animation: slideDown 0.3s ease;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateX(-50%) translateY(-10px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        /* 隐藏/显示 */
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="alert" id="success-alert">提示信息</div>

    <h1 class="main-title">我的AI助手</h1>

    <!-- 登录卡片 -->
    <div class="card-container" id="login-container">
        <div class="card-header">
            <h2 class="card-title">登录</h2>
        </div>
        <div class="card-body">
            <form id="login-form">
                <div class="form-group">
                    <label for="login-username" class="form-label">用户名</label>
                    <input type="text" id="login-username" class="form-control" placeholder="请输入用户名" required>
                </div>
                <div class="form-group">
                    <label for="login-password" class="form-label">密码</label>
                    <input type="password" id="login-password" class="form-control" placeholder="请输入密码" required>
                </div>
                <button type="submit" class="btn-submit">登录</button>
            </form>
            <div class="switch-link">
                没有账号？<a onclick="showRegister()">去注册账号</a>
            </div>
        </div>
    </div>

    <!-- 注册卡片 -->
    <div class="card-container hidden" id="register-container">
        <div class="card-header">
            <h2 class="card-title">注册</h2>
        </div>
        <div class="card-body">
            <form id="register-form">
                <div class="form-group">
                    <label for="register-username" class="form-label">用户名</label>
                    <input type="text" id="register-username" class="form-control" placeholder="请输入用户名" required>
                </div>
                <div class="form-group">
                    <label for="register-password" class="form-label">密码</label>
                    <input type="password" id="register-password" class="form-control" placeholder="请输入密码" required>
                </div>
                <button type="submit" class="btn-submit">注册</button>
            </form>
            <div class="switch-link">
                已有账号？<a onclick="showLogin()">返回登录</a>
            </div>
        </div>
    </div>

    <script>
        function showAlert(message) {
            const alertBox = document.getElementById('success-alert');
            alertBox.textContent = message;
            alertBox.style.display = 'block';
            setTimeout(() => { alertBox.style.display = 'none'; }, 1500);
        }
        function showRegister() {
            document.getElementById('login-container').classList.add('hidden');
            document.getElementById('register-container').classList.remove('hidden');
        }
        function showLogin() {
            document.getElementById('register-container').classList.add('hidden');
            document.getElementById('login-container').classList.remove('hidden');
        }

        // 登录
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;
            fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            }).then(response => {
                if (response.status === 403) { showAlert('账号已在其他地方登录！'); throw new Error('已在其他地方登录'); }
                const contentType = response.headers.get('content-type');
                if (response.status === 200) {
                    if (contentType && contentType.includes('application/json')) return response.json();
                    else throw new Error('返回格式错误');
                } else if (response.status === 401) { showAlert('账号或密码错误！'); throw new Error('认证失败'); }
                else throw new Error('请求失败');
            }).then(data => {
                if (data && data.userId) { sessionStorage.setItem('userId', data.userId); showAlert('登录成功！'); window.location.href = '/menu'; }
                else throw new Error('无效的响应数据');
            }).catch(error => {
                console.error('Error:', error);
                if (!error.message.includes('已在其他地方登录') && !error.message.includes('认证失败')) showAlert('操作失败，请重试');
            });
        });

        // 注册
        document.getElementById('register-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('register-username').value;
            const password = document.getElementById('register-password').value;
            fetch('/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            }).then(response => {
                if (response.status === 200) {
                    showAlert('注册成功！');
                    document.getElementById('login-username').value = username;
                    document.getElementById('login-password').value = password;
                    setTimeout(showLogin, 1000);
                } else if (response.status === 409) { alert('用户名已被注册，请重新输入！'); }
            }).catch(error => console.error('注册错误:', error));
        });
    </script>
</body>
</html>
